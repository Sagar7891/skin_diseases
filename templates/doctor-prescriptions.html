<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard</title>
    <link rel="icon" href="{{ url_for('static', filename='images/img.png') }}" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="d-flex flex-column min-vh-100"
    style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa;">


    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-warning" href="{{ url_for('home') }}">Doctor Dashboard</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link text-light fw-semibold" style="transition: 0.3s;"
                            href="{{ url_for('home') }}">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-light fw-semibold" style="transition: 0.3s;" href="{{ url_for('doctor_create') }}">Add
                            User</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light fw-semibold" style="transition: 0.3s;" href="{{ url_for('doctor_users') }}">User
                            List</a>
                    </li>
                    
                    <li class="nav-item">
                        <a class="nav-link text-light fw-semibold" style="transition: 0.3s;" href="{{ url_for('prescriptions') }}">Add
                            prescriptions</a>
                    </li>
                    {% if session.get('email') %}
                    <li class="nav-item">
                        <a class="nav-link text-light fw-semibold" style="transition: 0.3s;"
                            href="{{ url_for('logout') }}">Logout</a>
                    </li>
                    {% else %}
                    <li class="nav-item">
                        <a class="nav-link text-light fw-semibold" style="transition: 0.3s;"
                            href="{{ url_for('login') }}">Login</a>
                    </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>


    <div class="container mt-5 pt-5">
    <form method="POST">
        <div class="form-group">
            <label>Patient Email</label>
            <input type="email" name="patient_email" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Medicine</label>
            <input type="text" name="medicine" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Dosage</label>
            <input type="text" name="dosage" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Notes</label>
            <textarea name="notes" class="form-control"></textarea>
        </div>
        <button type="submit" class="btn btn-success mt-3">Prescribe</button>
    </form>
</div>


    <footer class="footer text-center py-3 mt-auto" style="background: #212529; color: #ccc;">
        <div class="container">
            © 2025 <span class="text-light fw-bold">Autoimmune Skin Disease</span>.
        </div>
    </footer>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>

    <style>
        .nav-link:hover {
            color: #ffc107 !important;
            font-weight: bold;
        }

        .card:hover {
            box-shadow: 0 0 25px rgba(13, 110, 253, 0.3);
            transition: 0.3s ease;
        }
    </style>
</body>

</html>
