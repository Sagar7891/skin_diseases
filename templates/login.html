<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>
  <link rel="icon" href="{{ url_for('static', filename='images/img.png') }}" type="image/png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet" />
</head>

<body style="font-family: 'Poppins', sans-serif; background-color: #121212; color: #eee; margin: 0; padding: 0;">

  <nav class="navbar navbar-expand-lg navbar-dark fixed-top"
    style="background-color: #1f1f1f; box-shadow: 0 2px 8px rgba(0,0,0,0.7);">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('home') }}" style="color: #eee; font-weight: 600;">Autoimmune Skin Disease</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation"
        style="border-color: #444;">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('home') }}"
              style="color: #eee; font-weight: 500;">Home</a>
          </li>
          {% if session.get('email') %}
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('logout') }}"
              style="color: #eee; font-weight: 500;">Logout</a>
          </li>
          {% else %}
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('register') }}"
              style="color: #eee; font-weight: 500;">Register</a>
          </li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>

  <section class="d-flex justify-content-center align-items-center min-vh-100" style="padding-top: 70px;">
    <div class="login-box w-100 mx-3" style="
      max-width: 450px;
      background-color: #1e1e1e;
      padding: 40px;
      border-radius: 15px;
      border: 1px solid #333;
      box-shadow: 0 8px 20px rgba(0,0,0,0.8);
      transition: box-shadow 0.3s ease-in-out;
      color: #eee;
    " onmouseover="this.style.boxShadow='0 12px 30px rgba(0,0,0,0.9)';"
      onmouseout="this.style.boxShadow='0 8px 20px rgba(0,0,0,0.8)';">

      <h2 class="text-center mb-4" style="font-weight: 700; color: #fff;">Login</h2>

      {% for message in get_flashed_messages() %}
      <div style="color: #e74c3c; text-align: center; font-weight: 700; margin-bottom: 15px;">
        {{ message }}
      </div>
      {% endfor %}

      <form method="post" action="{{ url_for('login') }}">
        <label for="email" style="font-weight: 600; color: #ddd; margin-top: 15px; display: block;">Email</label>
        <input type="text" id="email" name="email" required
          style="
            width: 100%;
            padding: 12px 15px;
            margin-top: 5px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: #eee;
            font-size: 1rem;
            transition: background-color 0.2s ease, border-color 0.2s ease;
          "
          onfocus="this.style.backgroundColor='#3b3b3b'; this.style.borderColor='#888';"
          onblur="this.style.backgroundColor='#2a2a2a'; this.style.borderColor='#444';" />

        <label for="password" style="font-weight: 600; color: #ddd; margin-top: 15px; display: block;">Password</label>
        <input type="password" id="password" name="password" required
          style="
            width: 100%;
            padding: 12px 15px;
            margin-top: 5px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: #eee;
            font-size: 1rem;
            transition: background-color 0.2s ease, border-color 0.2s ease;
          "
          onfocus="this.style.backgroundColor='#3b3b3b'; this.style.borderColor='#888';"
          onblur="this.style.backgroundColor='#2a2a2a'; this.style.borderColor='#444';" />

        <input type="submit" value="Login"
          style="
            width: 100%;
            margin-top: 25px;
            padding: 14px;
            background-color: #000;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.7);
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
          "
          onmouseover="this.style.backgroundColor='#222'; this.style.boxShadow='0 8px 22px rgba(0,0,0,0.9)';"
          onmouseout="this.style.backgroundColor='#000'; this.style.boxShadow='0 5px 15px rgba(0,0,0,0.7)';" />
      </form>

      <div class="register-link" style="text-align: center; margin-top: 20px; font-size: 14px; color: #aaa;">
        Don't have an account?
        <a href="{{ url_for('register') }}" style="color: #eee; font-weight: 600; text-decoration: underline;"
          onmouseover="this.style.color='#fff';" onmouseout="this.style.color='#eee';">Register here</a>
      </div>
    </div>
  </section>

  <div class="footer text-center fw-bold" style="background-color: #1f1f1f; color: #eee; padding: 12px 0; font-size: 14px;">
    © 2025 . Autoimmune Skin Disease.
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
